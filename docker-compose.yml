services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: keyloop_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keyloop_inventory"]
      interval: 3s
      timeout: 3s
      retries: 10

  migration:
    build:
      context: ./backend
      dockerfile: migrations/Dockerfile
    command:
      - migrate
      - apply
      - --dir
      - file:///migrations
      - --url
      - postgres://postgres:postgres@postgres:5432/keyloop_inventory?search_path=public&sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: keyloop-inventory
      APP_VERSION: 1.0.0
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      LOG_LEVEL: info
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DBNAME: keyloop_inventory
      POSTGRES_SSL: "false"
      POSTGRES_MAX_IDLE_CONNS: 5
      POSTGRES_MAX_OPEN_CONNS: 50
    ports:
      - "8080:8080"
    depends_on:
      migration:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_INVENTORY_SOURCE: api
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
